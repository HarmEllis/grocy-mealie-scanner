name: Pages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)deploy (e.g. v0.1.0)"
        required: true
        type: string

# Workflow-level default is read-only. Each job opts in to the writes it
# actually needs:
#   release-assets → contents: write (gh release create / upload)
#   deploy-pages   → pages: write + id-token: write (OIDC for deploy-pages)
permissions:
  contents: read

# Only one Pages deploy in flight at a time; never cancel a running one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-firmware:
    name: Build firmware
    runs-on: ubuntu-24.04
    container:
      image: espressif/idf:release-v5.3
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          if ! printf '%s\n' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "Expected tag in form vMAJOR.MINOR.PATCH[-prerelease], got: $TAG" >&2
            exit 1
          fi

      - name: Verify tag ref exists (rejects same-named branches)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          # gh CLI is not in espressif/idf, so query the REST API directly.
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")
          if [ "$status" != "200" ]; then
            echo "Tag refs/tags/${TAG} does not exist in ${GITHUB_REPOSITORY} (HTTP ${status})." >&2
            echo "A branch with the same name will not be accepted." >&2
            exit 1
          fi

      - name: Checkout tag ref
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: refs/tags/${{ steps.tag.outputs.value }}

      - name: Mark workspace as safe (container UID mismatch)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache ESP-IDF managed components
        # TODO: pin to a commit SHA once a known-good version is verified.
        uses: actions/cache@v4
        with:
          path: firmware/managed_components
          key: managed-components-${{ hashFiles('firmware/dependencies.lock') }}

      - name: Build firmware (esp32s3)
        shell: bash
        run: |
          set -euo pipefail
          . "$IDF_PATH/export.sh"
          cd firmware
          idf.py set-target esp32s3
          idf.py build

      - name: Stage binaries + SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          # sync-bins.sh needs jq; espressif/idf doesn't ship it.
          if ! command -v jq >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq jq
          fi
          BINS_DIR="$PWD/bins" ./flash-server/sync-bins.sh
          ( cd bins && sha256sum *.bin > SHA256SUMS )

      - name: Upload firmware artifact
        # TODO: pin to a commit SHA once a known-good version is verified.
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bins
          path: bins/
          retention-days: 7
          if-no-files-found: error

  release-assets:
    name: Publish release assets
    needs: build-firmware
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout tag ref
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: refs/tags/${{ needs.build-firmware.outputs.tag }}

      - name: Download firmware artifact
        # TODO: pin to a commit SHA once a known-good version is verified.
        uses: actions/download-artifact@v4
        with:
          name: firmware-bins
          path: bins

      - name: Ensure GitHub Release exists, then upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-firmware.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi
          gh release upload "$TAG" \
            bins/*.bin \
            bins/SHA256SUMS \
            --clobber

  deploy-pages:
    name: Deploy GitHub Pages
    # Gate Pages on the Release upload so the public flasher can never
    # publish firmware that wasn't also published as an immutable Release
    # asset — keeps the two surfaces byte-identical and auditable.
    needs: [build-firmware, release-assets]
    runs-on: ubuntu-24.04
    permissions:
      contents: read   # actions/checkout needs read on the tag ref
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout tag ref
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: refs/tags/${{ needs.build-firmware.outputs.tag }}

      - name: Download firmware artifact
        # TODO: pin to a commit SHA once a known-good version is verified.
        uses: actions/download-artifact@v4
        with:
          name: firmware-bins
          path: flash-server/bins

      - name: Inject release tag into flasher
        env:
          TAG: ${{ needs.build-firmware.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          # 1) Show the version on the flasher page.
          sed -i "s|<!-- VERSION -->|Firmware <code>${TAG}</code>|g" flash-server/index.html

          # 2) Pin the manifest's version field to the release tag so
          #    ESP Web Tools reports the right version to the user.
          python3 - "$VERSION" <<'PY'
          import json, pathlib, sys
          version = sys.argv[1]
          path = pathlib.Path("flash-server/manifest.json")
          data = json.loads(path.read_text())
          data["version"] = version
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Configure GitHub Pages
        # TODO: pin to a commit SHA once a known-good version is verified.
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        # TODO: pin to a commit SHA once a known-good version is verified.
        uses: actions/upload-pages-artifact@v3
        with:
          path: flash-server

      - name: Deploy to GitHub Pages
        id: deployment
        # TODO: pin to a commit SHA once a known-good version is verified.
        uses: actions/deploy-pages@v4
